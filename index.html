<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/ark-icon-512.png">
    <link rel="icon" type="image/png" href="/ark-icon-512.png" />
    <title>Ark v2 SillyTavern</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@300;400;600;700&family=Oswald:wght@300;400;700&family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&family=Noto+Sans+Vietnamese:wght@300;400;700&family=Be+Vietnam+Pro:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-system)', 'Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              mystic: {
                950: '#020617', // Slate 950 - Deepest
                900: '#030712', // Darker than Slate 900
                800: '#0f172a', // Slate 900
                accent: '#38bdf8', // Sky 400
                glow: 'rgba(56, 189, 248, 0.5)'
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --font-system: 'Inter', sans-serif;
        --font-size-base: 16px;
      }
      html {
        font-family: var(--font-system), sans-serif;
        font-size: var(--font-size-base);
      }
      body {
        font-family: var(--font-system), sans-serif;
        font-size: 1rem;
        overflow: hidden; 
      }
      * {
        font-family: inherit;
      }
      /* Custom scrollbar for future text logs */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
